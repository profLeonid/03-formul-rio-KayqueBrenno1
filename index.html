<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Criar Conta</title>
</head>

<body class="bg-red-600 min-h-screen flex justify-center flex-col">

    <div class="flex justify-center text-white text-5xl font-light mb-8">
        Criar Conta
    </div>

    <div class="flex items-center justify-center gap-3">

        <a href="">
            <img src="./img/facebook-icon.png" alt="">
        </a>

        <a href="">
            <img src="./img/google-icon.png" alt="">
        </a>

        <a href="">
            <img src="./img/linkind-icon.png" alt="">
        </a>
    </div>

    <div class="flex justify-center text-white mt-6 mb-8">
        ou cadastre seu email
    </div>

    <div class="flex justify-center">

        <div class="w-80 space-y-4">

            <input type="text" placeholder="Nome" class="bg-gray-100 p-2 w-full text-gray-500">
            <input type="email" placeholder="Email" class="bg-gray-100 p-2 w-full text-gray-500">
            <input type="password" placeholder="Senha" class="bg-gray-100 p-2 w-full text-gray-500">

            <button
                class="text-white font-semibold px-10 py-2 mt-4 rounded-full border-2 border-white block mx-auto hover:bg-gray-200/50 transition-all duration-300">
                CADASTRAR
            </button>

            <div class="flex gap-1 text-white justify-center">
                <p class="text-gray-300">Ja tem conta?</p>
                <a href="">Login</a>
            </div>

        </div>

    </div>
</body>

</html>
